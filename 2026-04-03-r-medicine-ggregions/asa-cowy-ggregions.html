#### Steb 2bb (for the truely curious) Inspect StatRegions compute


``` r
ggregions:::StatRegion$compute_panel
```

```
&lt;ggproto method&gt;
  &lt;Wrapper function&gt;
    function (...) 
compute_panel(...)

  &lt;Inner function (f)&gt;
    function (data, scales, ref_data, keep = NULL, drop = NULL, stamp = F) 
{
    ref_data$id &lt;- ref_data[1][[1]]
    if (!is.null(keep)) {
        ref_data &lt;- dplyr::filter(ref_data, id %in% keep)
    }
    if (!is.null(drop)) {
        ref_data &lt;- dplyr::filter(ref_data, !(id %in% drop))
    }
    if (!stamp) {
        ref_data_long &lt;- pivot_longer(mutate(ref_data, across(-geometry, 
            as.character)), cols = -c(geometry, id), names_to = ".id_type", 
            values_to = "region")
        length(ref_data_long$region) == length(unique(ref_data_long$region))
        ref_data_long &lt;- ggplot2::StatSfCoordinates$compute_group(ggplot2::StatSf$compute_panel(ref_data_long, 
            coord = ggplot2::CoordSf), coord = ggplot2::CoordSf)
        out &lt;- dplyr::inner_join(ref_data_long, data, by = join_by(region))
        inner_join(sf::st_drop_geometry(ref_data), out, by = join_by(id))
    }
    else {
        ggplot2::StatSfCoordinates$compute_group(ggplot2::StatSf$compute_panel(ref_data, 
            coord = ggplot2::CoordSf), coord = ggplot2::CoordSf)
    }
}
```

&lt;!-- ## Deliver intuitive, newcomer-welcoming spatial viz experience --&gt;

&lt;!-- By including the newly specified `geom_` function in their geo data package (perhaps instead or in addition to a convenience wrapper that are typical of geo packages) the package *users* will be able to use the` data + aes + geom` formulation for defining their plots.  Instead of positional aesthetics like x, y or geometry, a region identifier like `state_name` or `fips` can be used.  Internally, the regions `geom_*` will translate between place name or other identifier to the necessary borders (`sfc`s). --&gt;

&lt;!-- Even though there is no boundary information, analysts can map this data with the familiar  data + aesthetic mapping + layer syntax that makes ggplot2 easy to read, write, and reason about. --&gt;

## Unresolved questions for this project:


#### 1. Perhaps an *alternative to sf* would make sense for anatomical regions - we don't really anticipate *'crs'* to be specified.  Would allowing another preparation/Stat make sense - polygon-based?  Or just more attention to converting polygons to sf (relates to #3).

--

#### 2. The gganatogram objects bring up the fact that regions *overplot* - the heart is covered by the lungs.  So should there be a way to control the ordering (And Even if there is no regional overlap, overplotting can happen if we have the region more than once in the dataset)

--

#### 3. ggregions' focus is on gg-type, friendly API, *but how much focus should be on preparing reference data.*  The teethr and colon case might help here. 

--

#### 4. ggregions allows you to 'try-on' the ggregions framework (positional aesthetics that are symantic, 'texas' can be the answer to 'where'?).  But, *what if you don't want to take the ggregions dependency?*  Should there be more instruction regarding this?  Licensing considerations? 

--

#### 5. More relevant to the geographic case, it might be useful to allow different resolution of the regions reference data.  How important is addressing this a this point? 

--

#### 6. Can this project strengthen the R ecosystem? Motivation to get into packaging?  How do we make that clearer, and the pathway easier?
